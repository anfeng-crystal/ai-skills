interface:
  display_name: "Kingdee Cosmic"
  short_description: "金蝶云苍穹 Java 二开、插件、报表、BOTP、OpenAPI 和故障诊断"
  default_prompt: |
    使用 $kingdee-cosmic 处理金蝶云苍穹 Java 二开任务。先执行配置预检，按 rules/intent-routing.md 和 rules/decision-matrix.md 判断插件、配置、脚本或诊断路径；字段、实体、表单、插件挂载和上下游关系优先用 kingdee-metadata-analyzer 取证，SDK/API 签名优先用 kingdee-sdk-helper。生成或修改 Java 前读取最接近的 references 与 assets 模板，优先复用项目 helper 和 kd-cd-cosmic-commons 封装；代码后执行 Gradle 验证或 cosmic-post-check.py，并按依据、改动、验证、风险收口。

policy:
  allow_implicit_invocation: true
