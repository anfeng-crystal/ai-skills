interface:
  display_name: "Kingdee Metadata Analyzer"
  short_description: "苍穹实体元数据、绑定插件、源码来源和上下游关系分析"
  default_prompt: |
    使用 $kingdee-metadata-analyzer 按实体标识分析苍穹元数据、字段证据、PC/移动页面绑定和插件挂载。优先使用当前项目根目录的显式 ok-cosmic 配置；ztjg 默认查 dev 用 ok-cosmic.dev.json，用户明确要求生产时用 ok-cosmic.prod.json，只有项目内没有可用配置时才回退项目配置表。缺 Python 依赖时先运行 bootstrap-python-env.py 主动创建本地 venv 并安装依赖，安装失败才降级。凭据按当前环境变量、项目 .env、既有 JSON 兼容字段依次解析，不要求用户把每个项目密码都长期放到全局环境变量；缺 AI_KNOWLEDGE_ROOT 只作为降级信息。需要给其它 Kingdee skill 消费时，用 metadata_contract.py 生成 machine-readable 摘要。报告只写稳定事实、证据边界和复用途径；如果已有插件源码、模板、helper 或标准平台能力可直接复用，也要点明。

policy:
  allow_implicit_invocation: true
